<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="1200" height="340">
  <defs>
    <!-- Animated gradient for the background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="50%" stop-color="#0d1224"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>

    <!-- Neon glow gradient -->
    <radialGradient id="neonGlow1" cx="20%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#6c3ce0" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#6c3ce0" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="neonGlow2" cx="80%" cy="60%" r="55%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="neonGlow3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6b9d" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#ff6b9d" stop-opacity="0"/>
    </radialGradient>

    <!-- Dot grid pattern -->
    <pattern id="dotGrid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="0.8" fill="#6c3ce0" opacity="0.15"/>
    </pattern>

    <!-- Hex pattern -->
    <pattern id="hexPattern" x="0" y="0" width="60" height="52" patternUnits="userSpaceOnUse">
      <polygon points="30,2 55,15 55,37 30,50 5,37 5,15" fill="none" stroke="#00d4ff" stroke-width="0.3" opacity="0.06"/>
    </pattern>

    <!-- Animated scanning line -->
    <linearGradient id="scanLine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0"/>
      <stop offset="45%" stop-color="#00d4ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00d4ff" stop-opacity="0.15"/>
      <stop offset="55%" stop-color="#00d4ff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </linearGradient>

    <style>
      @keyframes pulseGlow {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 0.6; }
      }

      @keyframes scanMove {
        0% { transform: translateY(-340px); }
        100% { transform: translateY(340px); }
      }

      @keyframes nodeFlicker {
        0%, 100% { opacity: 0.4; }
        25% { opacity: 0.8; }
        50% { opacity: 0.3; }
        75% { opacity: 0.9; }
      }

      @keyframes circlePulse {
        0%, 100% { r: 2; opacity: 0.6; }
        50% { r: 4; opacity: 1; }
      }

      @keyframes dashFlow {
        0% { stroke-dashoffset: 100; }
        100% { stroke-dashoffset: 0; }
      }

      .glow-pulse {
        animation: pulseGlow 5s ease-in-out infinite;
      }

      .scan-line {
        animation: scanMove 6s linear infinite;
      }

      .node-flicker {
        animation: nodeFlicker 3s ease-in-out infinite;
      }

      .circle-pulse {
        animation: circlePulse 2.5s ease-in-out infinite;
      }

      .dash-flow {
        stroke-dasharray: 8, 12;
        animation: dashFlow 3s linear infinite;
      }

      .name-text {
        fill: transparent;
        stroke: #00d4ff;
        stroke-width: 1.5;
        paint-order: stroke;
        stroke-linejoin: round;
      }

      .subtitle {
        fill: #8b93a8;
        font-family: 'Segoe UI', sans-serif;
        font-size: 16px;
        letter-spacing: 4px;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="340" rx="16" fill="url(#bgGrad)"/>
  
  <!-- Patterns -->
  <rect width="1200" height="340" rx="16" fill="url(#dotGrid)"/>
  <rect width="1200" height="340" rx="16" fill="url(#hexPattern)"/>
  
  <!-- Glow layers -->
  <g class="glow-pulse">
    <rect width="1200" height="340" rx="16" fill="url(#neonGlow1)"/>
    <rect width="1200" height="340" rx="16" fill="url(#neonGlow2)"/>
    <rect width="1200" height="340" rx="16" fill="url(#neonGlow3)"/>
  </g>

  <!-- Scanning line effect -->
  <rect class="scan-line" width="1200" height="340" rx="16" fill="url(#scanLine)"/>

  <!-- Corner brackets -->
  <path d="M16 60V16H60" fill="none" stroke="#6c3ce0" stroke-width="1.2" opacity="0.5"/>
  <path d="M1184 280V324H1140" fill="none" stroke="#00d4ff" stroke-width="1.2" opacity="0.5"/>
  <path d="M1184 60V16H1140" fill="none" stroke="#ff6b9d" stroke-width="0.8" opacity="0.3"/>
  <path d="M16 280V324H60" fill="none" stroke="#ff6b9d" stroke-width="0.8" opacity="0.3"/>

  <!-- Decorative circuit lines -->
  <g opacity="0.85">
    <!-- Left side circuits -->
    <line x1="30" y1="80" x2="180" y2="80" stroke="#6c3ce0" stroke-opacity="0.18" stroke-width="1" class="dash-flow"/>
    <line x1="50" y1="120" x2="200" y2="120" stroke="#00d4ff" stroke-opacity="0.12" stroke-width="1"/>
    <line x1="80" y1="160" x2="280" y2="160" stroke="#6c3ce0" stroke-opacity="0.15" stroke-width="1" class="dash-flow"/>
    <line x1="40" y1="200" x2="150" y2="200" stroke="#00d4ff" stroke-opacity="0.1" stroke-width="1"/>
    <line x1="100" y1="240" x2="250" y2="240" stroke="#6c3ce0" stroke-opacity="0.14" stroke-width="1"/>
    <line x1="60" y1="280" x2="180" y2="280" stroke="#ff6b9d" stroke-opacity="0.1" stroke-width="1" class="dash-flow"/>

    <!-- Right side circuits -->
    <line x1="920" y1="70" x2="1100" y2="70" stroke="#00d4ff" stroke-opacity="0.14" stroke-width="1"/>
    <line x1="950" y1="110" x2="1150" y2="110" stroke="#6c3ce0" stroke-opacity="0.12" stroke-width="1" class="dash-flow"/>
    <line x1="900" y1="150" x2="1080" y2="150" stroke="#ff6b9d" stroke-opacity="0.1" stroke-width="1"/>
    <line x1="970" y1="190" x2="1160" y2="190" stroke="#00d4ff" stroke-opacity="0.16" stroke-width="1" class="dash-flow"/>
    <line x1="920" y1="230" x2="1100" y2="230" stroke="#6c3ce0" stroke-opacity="0.12" stroke-width="1"/>
    <line x1="960" y1="270" x2="1140" y2="270" stroke="#00d4ff" stroke-opacity="0.1" stroke-width="1"/>
  </g>

  <!-- Animated node dots -->
  <circle cx="180" cy="80" r="2" fill="#6c3ce0" class="circle-pulse"/>
  <circle cx="200" cy="120" r="2" fill="#00d4ff" class="circle-pulse" style="animation-delay: 0.5s"/>
  <circle cx="280" cy="160" r="2" fill="#6c3ce0" class="circle-pulse" style="animation-delay: 1s"/>
  <circle cx="250" cy="240" r="2" fill="#6c3ce0" class="circle-pulse" style="animation-delay: 1.5s"/>
  <circle cx="1100" cy="70" r="2" fill="#00d4ff" class="circle-pulse" style="animation-delay: 0.3s"/>
  <circle cx="1080" cy="150" r="2" fill="#ff6b9d" class="circle-pulse" style="animation-delay: 0.8s"/>
  <circle cx="1160" cy="190" r="2" fill="#00d4ff" class="circle-pulse" style="animation-delay: 1.3s"/>
  <circle cx="1140" cy="270" r="2" fill="#00d4ff" class="circle-pulse" style="animation-delay: 1.8s"/>

  <!-- Floating geometric shapes -->
  <rect x="140" y="100" width="8" height="8" rx="1" fill="none" stroke="#6c3ce0" stroke-width="0.5" opacity="0.3" transform="rotate(45 144 104)" class="node-flicker"/>
  <rect x="1050" y="230" width="10" height="10" rx="1" fill="none" stroke="#00d4ff" stroke-width="0.5" opacity="0.25" transform="rotate(30 1055 235)" class="node-flicker" style="animation-delay: 1s"/>
  <polygon points="100,250 108,250 104,242" fill="none" stroke="#ff6b9d" stroke-width="0.5" opacity="0.2" class="node-flicker" style="animation-delay: 2s"/>
  <polygon points="1100,100 1108,100 1104,92" fill="none" stroke="#6c3ce0" stroke-width="0.5" opacity="0.25" class="node-flicker" style="animation-delay: 0.5s"/>

  <!-- Status indicator -->
  <circle cx="85" cy="40" r="4" fill="#00ff88" opacity="0.8" class="circle-pulse"/>
  <text x="100" y="44" fill="#00ff88" font-family="'Courier New', monospace" font-size="11" opacity="0.7">ONLINE</text>

  <!-- Version badge -->
  <text x="1095" y="44" fill="#8b93a8" font-family="'Courier New', monospace" font-size="10" opacity="0.5" text-anchor="end">v2.0.26</text>

  <!-- Main name text with neon stroke -->
  <text x="600" y="155" text-anchor="middle" font-family="'Segoe UI', 'Arial Black', sans-serif" font-weight="800" font-size="52" class="name-text" letter-spacing="3">
    HANJALA HABIB SADIK
  </text>

  <!-- Subtitle line -->
  <line x1="380" y1="185" x2="820" y2="185" stroke="#6c3ce0" stroke-width="0.5" opacity="0.3"/>

  <!-- Role text -->
  <text x="600" y="210" text-anchor="middle" class="subtitle">
    FULL STACK DEVELOPER  ·  DIGITAL CRAFTSMAN
  </text>

  <!-- Bottom decorative bar -->
  <rect x="400" y="260" width="400" height="2" rx="1" fill="#6c3ce0" opacity="0.15"/>
  <rect x="500" y="260" width="200" height="2" rx="1" fill="#00d4ff" opacity="0.3"/>
  <rect x="570" y="258" width="60" height="6" rx="3" fill="#6c3ce0" opacity="0.2"/>

  <!-- Location tag -->
  <text x="600" y="290" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#6c3ce0" opacity="0.5" letter-spacing="2">
    📍 BANGLADESH  ·  🎓 CSE UNDERGRAD
  </text>

  <!-- Terminal cursor at bottom -->
  <text x="600" y="316" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#00d4ff" opacity="0.4">
    ~/sadikworkbd5622 $
  </text>
  <rect x="718" y="305" width="8" height="14" fill="#00d4ff" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0;0.5" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
